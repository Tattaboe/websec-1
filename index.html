<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="greenBox">
        <div class="inputRow">
            <input type="number" id="firstNum" class="numberInput firstNumber">
            <select id="operator" class="operatorSelect">
                <option value="add">+</option>
                <option value="subtract">-</option>
                <option value="multiply">*</option>
                <option value="divide">/</option>
            </select>
            <input type="number" id="secondNum" class="numberInput secondNumber">
        </div>
        
        <button id="calcButton" class="actionButton">Подсчитать</button>
        
        <div id="resultBox" class="outputBox">
            <div class="oldResult"></div>
            <div class="newResult"></div>
        </div>
    </div>

    <div id="warnMsg" class="warningMessage"></div>

    <script src="script.js"></script>
</body>
</html>
